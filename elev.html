<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalii Elev - Catalog Digital</title>
    <link rel="stylesheet" href="elev.css" />
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <!-- html2canvas library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Module aplicație -->
    <script type="module">
      import './js/elev.js';
      import { initExport } from './js/export-image.js';

      document.addEventListener('DOMContentLoaded', () => {
        // Așteptăm puțin pentru a se încărca datele
        setTimeout(initExport, 100);
      });
    </script>
  </head>
  <body>
    <div class="container">
      <!-- Header cu navigație -->
      <header class="header">
        <a href="index.html" class="btn-back">← Înapoi</a>
        <h1 id="nume-elev" class="nume-elev">Nume Elev</h1>
        <p id="info-clasa" class="info-clasa">Clasa</p>
      </header>

      <!-- Navigație între elevi -->
      <nav class="nav-elevi">
        <button id="btn-prev" class="btn-nav" disabled>← Anterior</button>
        <select id="select-elev" class="select-elev"></select>
        <button id="btn-next" class="btn-nav">Următor →</button>
      </nav>

      <!-- Sumar rapid -->
      <section class="sumar">
        <div class="sumar-card">
          <span class="sumar-valoare" id="media-generala">-</span>
          <span class="sumar-eticheta">Media generală</span>
        </div>
        <div class="sumar-card">
          <span class="sumar-valoare" id="pozitie-clasament">-</span>
          <span class="sumar-eticheta">Poziția în clasă</span>
        </div>
        <div class="sumar-card">
          <span class="sumar-valoare" id="total-absente">-</span>
          <span class="sumar-eticheta">Total absențe</span>
        </div>
      </section>

      <!-- Tabs pentru Note / Absențe -->
      <div class="tabs">
        <button class="tab active" data-tab="note">📚 Note</button>
        <button class="tab" data-tab="absente">📋 Absențe</button>
      </div>

      <!-- Conținut Tab Note -->
      <section id="tab-note" class="tab-content active">
        <div class="tabel-container">
          <table id="tabel-note" class="tabel">
            <thead>
              <tr>
                <th>Disciplina</th>
                <th>Note</th>
                <th>Media</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <button id="btn-export-note" class="btn btn-export">📷 Exportă imagine</button>
      </section>

      <!-- Conținut Tab Absențe -->
      <section id="tab-absente" class="tab-content">
        <!-- Filtre absențe -->
        <div class="filtre">
          <span class="filtre-label">Filtrează:</span>
          <div class="filtre-butoane">
            <button class="filtru active" data-filtru="toate">Toate</button>
            <button class="filtru" data-filtru="nemotivata">Nemotivate</button>
            <button class="filtru" data-filtru="scutire-medicala">Scutire med.</button>
            <button class="filtru" data-filtru="invoire-parinte">Invoiere</button>
            <button class="filtru" data-filtru="alt-motiv">Alte motive</button>
          </div>
        </div>

        <!-- Statistici absențe elev -->
        <div class="absente-stats">
          <div class="stat-item">
            <span class="stat-numar" id="abs-total">0</span>
            <span class="stat-label">Total</span>
          </div>
          <div class="stat-item nemotivata">
            <span class="stat-numar" id="abs-nemotivate">0</span>
            <span class="stat-label">Nemotivate</span>
          </div>
          <div class="stat-item motivata">
            <span class="stat-numar" id="abs-motivate">0</span>
            <span class="stat-label">Motivate</span>
          </div>
        </div>

        <div class="tabel-container">
          <table id="tabel-absente" class="tabel">
            <thead>
              <tr>
                <th>Data</th>
                <th>Materia</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <p id="absente-goale" class="mesaj-gol hidden">Nu există absențe înregistrate.</p>
        <button id="btn-export-absente" class="btn btn-export">📷 Exportă imagine</button>
      </section>

      <!-- Footer -->
      <footer class="footer">
        <a href="statistici.html" class="btn btn-secondary">📊 Statistici clasă</a>
      </footer>
    </div>
  </body>
</html>
