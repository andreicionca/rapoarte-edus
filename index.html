<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rapoarte catalog electronic</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="icon" type="image/png" href="img/favicon.png" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>Rapoarte catalog electronic EDUS</h1>
        <p id="subtitlu" class="subtitlu">Încarcă raportul pentru a vedea situația elevilor</p>
        <button id="btn-arhiva-noua" class="btn-arhiva-noua hidden">🔄 Încarcă alt raport</button>
      </header>

      <main>
        <!-- Zona de upload -->
        <section class="upload-section">
          <div id="drop-zone" class="drop-zone">
            <div class="drop-zone-content">
              <svg
                class="upload-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
              </svg>
              <p class="drop-text">Trage arhiva ZIP aici</p>
              <p class="drop-text-secondary">sau click pentru a selecta</p>
            </div>
            <input type="file" id="file-input" accept=".zip" hidden />
          </div>
          <p id="upload-status" class="upload-status"></p>
        </section>

        <!-- Lista elevi (ascunsă inițial) -->
        <section id="elevi-container" class="elevi-container hidden">
          <h2 class="elevi-titlu">Elevi</h2>
          <div class="elevi-lista"></div>

          <div class="actiuni">
            <a href="statistici.html" class="btn btn-secondary"> 📊 Statistici clasă </a>
          </div>
        </section>

        <!-- Buton încărcare arhivă nouă -->
      </main>
    </div>

    <!-- JSZip library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- Module aplicație -->
    <script type="module">
      import { initUpload, verificaDateExistente } from './js/upload.js';
      import { existaDate, stergeDate } from './js/data-store.js';

      // Expunem funcțiile necesare global pentru upload.js
      window.dataStore = {
        incarcaToateDate: () => import('./js/data-store.js').then((m) => m.incarcaToateDate()),
      };

      // Inițializare la încărcarea paginii
      document.addEventListener('DOMContentLoaded', async () => {
        initUpload();

        // Verificăm dacă există date deja încărcate
        if (existaDate()) {
          // Ascundem zona de upload
          document.querySelector('.upload-section').classList.add('hidden');
          // Afișăm lista de elevi
          const { incarcaToateDate } = await import('./js/data-store.js');
          const date = incarcaToateDate();
          afiseazaListaEleviDirect(date.elevi, date.clasa);
        }

        // Buton pentru încărcare altă arhivă
        const btnNoua = document.getElementById('btn-arhiva-noua');
        if (btnNoua) {
          btnNoua.addEventListener('click', () => {
            stergeDate();
            location.reload();
          });
        }
      });

      function afiseazaListaEleviDirect(elevi, clasa) {
        const container = document.getElementById('elevi-container');
        if (!container) return;

        container.classList.remove('hidden');

        const titlu = container.querySelector('.elevi-titlu');
        if (titlu) {
          titlu.textContent = `Clasa ${clasa} - ${elevi.length} elevi`;
        }

        const lista = container.querySelector('.elevi-lista');
        if (!lista) return;

        lista.innerHTML = '';

        elevi.forEach((elev, index) => {
          const item = document.createElement('a');
          item.href = `elev.html?id=${index}`;
          item.className = 'elev-item';
          item.textContent = elev;
          lista.appendChild(item);
        });

        // Afișăm butonul pentru arhivă nouă
        document.getElementById('btn-arhiva-noua')?.classList.remove('hidden');
      }
    </script>
  </body>
</html>
